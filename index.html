<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Store Manager</h2>
        <button id="btn-dashboard" class="nav-btn active">Dashboard</button>
        <button id="btn-transactions" class="nav-btn">Transactions</button>
        <button id="btn-inventory" class="nav-btn">Inventory</button>
    </div>

    <div class="main-content">
        <!-- DASHBOARD TAB -->
        <div id="tab-dashboard" class="tab active">
            <h1>Dashboard</h1>
            <div class="cards">
                <div class="card">
                    <h3>Total Sales</h3>
                    <p id="dash-sales">₹0.00</p>
                </div>
                <div class="card">
                    <h3>Total Purchases</h3>
                    <p id="dash-purchases">₹0.00</p>
                </div>
                <div class="card">
                    <h3>Items in Inventory</h3>
                    <p id="dash-inventory">0</p>
                </div>
            </div>
        </div>

        <!-- TRANSACTIONS TAB -->
        <div id="tab-transactions" class="tab">
            <h1>Transactions</h1>
            <div class="form-container">
                <h3>Record Transaction</h3>
                <form id="form-transaction">
                    <select id="trans-type" required>
                        <option value="Sale">Sale (Out)</option>
                        <option value="Purchase">Purchase (In)</option>
                    </select>
                    <input type="text" id="trans-item" placeholder="Item Name" required>
                    <input type="number" id="trans-qty" placeholder="Quantity" required>
                    <input type="number" id="trans-amount" placeholder="Total Amount (₹)" required>
                    <button type="submit">Add Transaction</button>
                </form>
            </div>
            <h3>Transaction History</h3>
            <table id="table-transactions">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- INVENTORY TAB -->
        <div id="tab-inventory" class="tab">
            <h1>Inventory</h1>
            <div class="form-container">
                <h3>Add New Item</h3>
                <form id="form-inventory">
                    <input type="text" id="inv-name" placeholder="Item Name" required>
                    <input type="number" id="inv-qty" placeholder="Starting Quantity" required>
                    <input type="number" id="inv-price" placeholder="Unit Price (₹)" required>
                    <button type="submit">Add Item</button>
                </form>
            </div>
            <h3>Current Stock</h3>
            <table id="table-inventory">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Load JavaScript as a Module -->
    <script type="module" src="app.js"></script>
</body>
</html>
