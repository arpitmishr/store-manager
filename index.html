<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinny Fashion - Business Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel Export/Import -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">

    <!-- LOGIN SCREEN (Visible by default until authenticated) -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-100 dark:bg-gray-800">
        <div class="bg-white dark:bg-gray-900 p-8 rounded-lg shadow-xl w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Tinny Fashion Login</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Email</label>
                    <input type="email" id="email" class="w-full p-2 border rounded dark:bg-gray-800 dark:border-gray-700" required>
                </div>
                <div>
                    <label class="block text-sm mb-1">Password</label>
                    <input type="password" id="password" class="w-full p-2 border rounded dark:bg-gray-800 dark:border-gray-700" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">Log In</button>
            </form>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <!-- MAIN APPLICATION (Hidden until authenticated) -->
    <div id="app-container" class="hidden flex h-screen overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-white dark:bg-gray-800 shadow-md flex flex-col">
            <div class="p-6 border-b dark:border-gray-700">
                <h2 class="text-xl font-bold text-blue-600">Tinny Fashion</h2>
                <p class="text-xs text-gray-500">Business Manager</p>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button class="nav-btn w-full text-left p-3 rounded bg-blue-50 text-blue-600 dark:bg-gray-700 dark:text-blue-400 font-semibold" data-target="dashboard">📊 Dashboard</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-target="sales">🛒 Sales</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-target="inventory">📦 Inventory</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-target="transactions">📝 Transactions</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-target="analytics">📈 Analytics</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-target="credit">💳 Credit Mgmt</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700" data-target="settings">⚙️ Settings</button>
            </nav>
            <div class="p-4 border-t dark:border-gray-700">
                <button id="logout-btn" class="w-full p-2 bg-red-100 text-red-600 rounded hover:bg-red-200 font-bold">Logout</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-8 relative">
            
            <!-- Dashboard Section -->
            <section id="dashboard" class="page-section">
                <h2 class="text-3xl font-bold mb-6">Today's Overview</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-l-4 border-blue-500">
                        <p class="text-sm text-gray-500">Today's Sales</p>
                        <h3 class="text-2xl font-bold" id="today-sales">₹0.00</h3>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-l-4 border-green-500">
                        <p class="text-sm text-gray-500">Today's Profit</p>
                        <h3 class="text-2xl font-bold" id="today-profit">₹0.00</h3>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-l-4 border-yellow-500">
                        <p class="text-sm text-gray-500">Low Stock Items</p>
                        <h3 class="text-2xl font-bold text-yellow-600" id="low-stock-count">0</h3>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-l-4 border-purple-500">
                        <p class="text-sm text-gray-500">Trending Item</p>
                        <h3 class="text-xl font-bold" id="trending-item">-</h3>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                    <h3 class="text-xl font-semibold mb-4">Sales Trend</h3>
                    <canvas id="salesTrendChart" height="100"></canvas>
                </div>
            </section>

            <!-- Sales Section (Scaffold) -->
            <section id="sales" class="page-section hidden">
                <h2 class="text-3xl font-bold mb-6">Sales Management</h2>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                    <h3 class="text-xl font-semibold mb-4">New Bill</h3>
                    <!-- Search & Auto-complete -->
                    <input type="text" id="item-search" placeholder="Search inventory..." class="w-full p-3 border rounded mb-4 dark:bg-gray-700 dark:border-gray-600">
                    <div id="cart-items" class="space-y-3 mb-4">
                        <!-- Cart items injected via JS -->
                    </div>
                    <button class="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700">Complete Sale</button>
                </div>
            </section>

            <!-- Add additional sections (inventory, transactions, analytics, etc.) similarly -->
            <!-- ... -->

        </main>
    </div>

    <!-- Modular JS Imports -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
