<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Manager Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex w-full h-full items-center justify-center bg-gray-900 absolute inset-0 z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Store Manager</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Email</label>
                    <input type="email" id="email" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium">Password</label>
                    <input type="password" id="password" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">Login</button>
            </form>
            <p id="auth-error" class="text-red-500 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <!-- APP WRAPPER (Hidden until logged in) -->
    <div id="app-wrapper" class="w-full h-full flex hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
            <div class="p-4 text-2xl font-bold border-b border-gray-800">Store Manager</div>
            <nav class="flex-1 p-4 space-y-2">
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-800 bg-gray-800" data-target="dashboard">Dashboard</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-800" data-target="inventory">Inventory</button>
                <button class="nav-btn w-full text-left p-3 rounded hover:bg-gray-800" data-target="sales">Record Sale</button>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button id="logout-btn" class="w-full bg-red-600 p-2 rounded hover:bg-red-700">Logout</button>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            
            <!-- Mobile Header -->
            <header class="bg-white shadow p-4 md:hidden flex justify-between items-center">
                <h1 class="text-xl font-bold">Store Manager</h1>
                <button id="logout-btn-mobile" class="text-red-600 font-bold">Logout</button>
            </header>

            <div class="p-6">
                <!-- DASHBOARD SECTION -->
                <section id="dashboard" class="page-section">
                    <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-lg shadow border-t-4 border-blue-500">
                            <h3 class="text-gray-500 font-medium">Total Products</h3>
                            <p id="stat-products" class="text-3xl font-bold">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-lg shadow border-t-4 border-green-500">
                            <h3 class="text-gray-500 font-medium">Total Sales Value</h3>
                            <p id="stat-sales" class="text-3xl font-bold">₹0</p>
                        </div>
                    </div>
                </section>

                <!-- INVENTORY SECTION -->
                <section id="inventory" class="page-section hidden">
                    <h2 class="text-3xl font-bold mb-6">Inventory Management</h2>
                    <div class="bg-white p-6 rounded-lg shadow mb-6">
                        <h3 class="text-lg font-bold mb-4">Add New Item</h3>
                        <form id="add-item-form" class="flex gap-4 items-end">
                            <div class="flex-1">
                                <label class="block text-sm">Item Name</label>
                                <input type="text" id="item-name" class="w-full border p-2 rounded" required>
                            </div>
                            <div class="w-32">
                                <label class="block text-sm">Quantity</label>
                                <input type="number" id="item-qty" class="w-full border p-2 rounded" required>
                            </div>
                            <div class="w-32">
                                <label class="block text-sm">Price (₹)</label>
                                <input type="number" id="item-price" class="w-full border p-2 rounded" required>
                            </div>
                            <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Add</button>
                        </form>
                    </div>
                    
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="p-4">Item Name</th>
                                    <th class="p-4">Stock</th>
                                    <th class="p-4">Price</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body" class="divide-y">
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- SALES SECTION -->
                <section id="sales" class="page-section hidden">
                    <h2 class="text-3xl font-bold mb-6">Record a Sale</h2>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <form id="sale-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium">Select Item</label>
                                <select id="sale-item" class="w-full border p-2 rounded" required>
                                    <option value="">-- Choose Item --</option>
                                    <!-- Loaded via JS -->
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium">Quantity Sold</label>
                                <input type="number" id="sale-qty" min="1" class="w-full border p-2 rounded" required>
                            </div>
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Complete Sale</button>
                        </form>
                        <p id="sale-msg" class="mt-4 font-bold"></p>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Main Logic - Type Module is critical! -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
